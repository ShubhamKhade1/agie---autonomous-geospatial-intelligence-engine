services:
  # 1. TimescaleDB (Private Service to retain time-series features not in managed PG)
  - type: pserv
    name: agie-db
    env: docker
    image: timescale/timescaledb:latest-pg14
    disk:
      name: timescaledb-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10
    envVars:
      - key: POSTGRES_USER
        value: agie
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: geospatial_engine

  # 2. Redis (Managed)
  - type: redis
    name: agie-redis
    plan: free # or starter if needed for production
    maxmemoryPolicy: noeviction

  # 3. FastAPI Backend
  - type: web
    name: agie-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn src.api.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: postgresql://agie:${agie-db.envVars.POSTGRES_PASSWORD}@agie-db:5432/geospatial_engine
      - key: REDIS_URL
        fromService:
          type: redis
          name: agie-redis
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false # You will enter this securely in Render dashboard
      # Add other synced secrets as needed (NASA Earthdata, etc)
      - key: EARTHDATA_USERNAME
        sync: false
      - key: EARTHDATA_PASSWORD
        sync: false
      - key: COPERNICUS_USERNAME
        sync: false
      - key: COPERNICUS_PASSWORD
        sync: false

  # 4. Celery Worker
  - type: worker
    name: agie-worker
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A src.workers.tasks worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        value: postgresql://agie:${agie-db.envVars.POSTGRES_PASSWORD}@agie-db:5432/geospatial_engine
      - key: REDIS_URL
        fromService:
          type: redis
          name: agie-redis
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false 
      - key: EARTHDATA_USERNAME
        sync: false
      - key: EARTHDATA_PASSWORD
        sync: false
      - key: COPERNICUS_USERNAME
        sync: false
      - key: COPERNICUS_PASSWORD
        sync: false

  # 5. React Frontend (Static Site)
  - type: web
    name: agie-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      # We point the frontend to the Render deployed API
      - key: VITE_API_URL
        fromService:
          type: web
          name: agie-api
          env: public
    routes:
      # Send all unmatched routes to index.html for React Router
      - type: rewrite
        source: /*
        destination: /index.html
