# Prototype Blueprint (free tier): API + static site only.
# Background workers are not available on Render's free plan — that was blocking sync.
# Postgres / Redis / Celery were removed here because the current FastAPI app does not
# connect to them. When you need ingestion + workers, add a paid plan and restore
# those resources (see git history or docker-compose.yml).

services:
  - type: web
    name: agie-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn src.api.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 10000

  - type: web
    name: agie-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://agie-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
