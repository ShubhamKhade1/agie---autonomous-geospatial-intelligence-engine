databases:
  # 1. Managed PostgreSQL (Render handles backups, connection pooling, etc.)
  - name: agie-db
    plan: free
    databaseName: geospatial_engine
    user: agie

services:
  # 2. Redis (Managed)
  - type: redis
    name: agie-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: [] # Only allow internal access

  # 3. FastAPI Backend
  - type: web
    name: agie-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn src.api.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agie-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agie-redis
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 10000

  # 4. Celery Worker (Background Worker)
  - type: worker
    name: agie-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A src.workers.tasks worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agie-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agie-redis
          property: connectionString

  # 5. React Frontend (Static Site)
  - type: web
    name: agie-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      # Public API URL baked into the Vite build (must match your agie-api service URL on Render).
      - key: VITE_API_URL
        value: https://agie-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
