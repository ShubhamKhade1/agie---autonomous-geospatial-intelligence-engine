version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: agie_db
    environment:
      - POSTGRES_USER=agie
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=geospatial_engine
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agie_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: agie_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: agie_worker
    command: celery -A src.workers.tasks worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  db_data:
